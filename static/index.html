<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocHelper Барс — помощник по документации</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="user-mode welcome-open">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <div id="welcome-overlay" class="welcome-overlay" role="dialog" aria-modal="true" aria-labelledby="welcome-title">
    <div class="welcome-modal glass">
      <span class="welcome-tag" id="welcome-tag"></span>
      <h2 id="welcome-title" class="welcome-title"></h2>
      <p class="welcome-lead" id="welcome-lead"></p>
      <ul class="welcome-features" id="welcome-features"></ul>
      <p class="welcome-hint" id="welcome-hint"></p>
      <button type="button" id="welcome-start" class="btn btn-primary welcome-start"></button>
    </div>
  </div>

  <div class="page-content" id="page-content" aria-hidden="true">
  <header class="site-header site-header--minimal">
    <div class="header-inner">
      <div class="brand brand--static">
        <span class="brand-product">DocHelper Барс</span>
      </div>
    </div>
  </header>

  <main class="site-main site-main--chat">
    <div class="hero hero--compact">
      <div>
        <h1 class="hero-title hero-title--sm">Привет! Я помогу с документацией</h1>
        <p class="hero-desc">Задайте вопрос — отвечу по базе знаний и покажу, из какого документа взят ответ.</p>
      </div>
    </div>

    <div class="chat-card glass">
      <div id="messages" class="messages"></div>
      <p class="faq-label">Частые темы</p>
      <div id="faq-chips" class="faq-chips" aria-label="Частые темы"></div>
      <form id="chat-form" class="chat-form">
        <div class="input-wrap">
          <input id="chat-input" placeholder="Задайте вопрос по документации…" autocomplete="off" />
        </div>
        <button type="submit" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Отправить
        </button>
        <button type="button" id="escalate-btn" class="btn btn-outline">Оператор</button>
      </form>
    </div>
  </main>

  <footer class="site-footer site-footer--minimal">
    <span>DocHelper Барс · хакathon «Королева Кода»</span>
    <a href="https://t.me/SUP_BARS_BOT" target="_blank" rel="noopener noreferrer" id="link-telegram">Telegram @SUP_BARS_BOT</a>
    <a href="/operator">Панель оператора</a>
    <a href="/presentation">Презентация</a>
  </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
