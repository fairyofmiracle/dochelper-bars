<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocHelper Барс — помощник по документации</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="user-mode">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <header class="site-header site-header--minimal">
    <div class="header-inner">
      <div class="brand brand--static">
        <img src="/static/bars-mascot.svg" alt="Барс" class="brand-mascot" width="40" height="40" />
        <span class="brand-divider"></span>
        <span class="brand-product">DocHelper Барс</span>
      </div>
    </div>
  </header>

  <main class="site-main site-main--chat">
    <div class="hero hero--compact">
      <img src="/static/bars-mascot.svg" alt="" class="hero-mascot" width="72" height="72" aria-hidden="true" />
      <div>
        <h1 class="hero-title hero-title--sm">Привет! Я помогу с документацией</h1>
        <p class="hero-desc">Задайте вопрос — отвечу по базе знаний и покажу, из какого документа взят ответ.</p>
      </div>
    </div>

    <div class="chat-card glass">
      <div id="messages" class="messages"></div>
      <p class="faq-label">Частые темы</p>
      <div id="faq-chips" class="faq-chips" aria-label="Частые темы"></div>
      <form id="chat-form" class="chat-form">
        <div class="input-wrap">
          <input id="chat-input" placeholder="Задайте вопрос по документации…" autocomplete="off" />
        </div>
        <label class="btn btn-outline image-upload-btn" title="Прикрепить скриншот">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <input type="file" id="chat-image" accept="image/*" hidden />
        </label>
        <button type="submit" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Отправить
        </button>
        <button type="button" id="escalate-btn" class="btn btn-outline">Оператор</button>
      </form>
    </div>
  </main>

  <footer class="site-footer site-footer--minimal">
    <span>DocHelper Барс · хакathon «Королева Кода»</span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
